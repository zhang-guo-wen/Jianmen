name: CI

"on":
  pull_request:
  push:
    branches:
      - dev

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download backend dependencies
        run: go mod download

      - name: Build backend
        run: go build ./...

      - name: Test backend
        run: go test ./... -count=1

      - name: Vet backend
        run: go vet ./...

  race:
    name: Backend race checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download backend dependencies
        run: go mod download

      - name: Run dbproxy and store race tests
        run: go test -race ./internal/server/dbproxy ./internal/store -count=1 -timeout=10m

  integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    needs: backend
    env:
      JIANMEN_REQUIRE_DOCKER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download backend dependencies
        run: go mod download

      - name: Test Docker-backed integration package
        run: go test -tags=integration ./internal/integration -count=1 -timeout=15m

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container without pushing
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: jianmen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
