name: Publish release

"on":
  push:
    tags:
      - "v*"

jobs:
  quality-gates:
    name: Verify build and test gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download backend dependencies
        run: go mod download

      - name: Build backend
        run: go build ./...

      - name: Test backend
        run: go test ./... -count=1

      - name: Vet backend
        run: go vet ./...

  release:
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release packages
        run: ./scripts/package-release.sh "${GITHUB_REF_NAME}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* \
              --verify-tag \
              --generate-notes \
              --title "Jianmen ${GITHUB_REF_NAME}"
          fi
