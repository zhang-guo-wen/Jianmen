services:
  volume-init:
    image: alpine:3.23
    user: "0:0"
    command:
      - sh
      - -ec
      - mkdir -p /app-data/rdp-spool /app-data/rdp-drive && chown 10001:10001 /app-data /app-data/rdp-spool /app-data/rdp-drive
    volumes:
      - jianmen-data:/app-data
    restart: "no"

  jianmen:
    image: jianmen:guacd-1.6.0
    platform: linux/amd64
    build:
      context: .
      args:
        GUACD_IMAGE: guacamole/guacd:1.6.0@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
    user: "10001:10001"
    ports:
      - "127.0.0.1:47100:47100"
      - "47102:47102"
      - "33060:33060"
      - "47110-47199:47110-47199"
    volumes:
      - jianmen-data:/app/data
      - jianmen-certs:/app/certs:ro
      - ./config.docker.web-rdp.example.json:/app/config.json:ro
    depends_on:
      volume-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  jianmen-data:
  jianmen-certs:
    external: true
